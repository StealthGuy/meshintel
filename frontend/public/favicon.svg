<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" class="grad-start" />
      <stop offset="100%" class="grad-end" />
    </linearGradient>
    <!-- Accent Gradient for Glowing elements and Central node -->
    <linearGradient id="accentGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Soft Glow Filter for the Central Hub -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <style>
    :root {
      --bg-start: #0f172a;
      --bg-end: #020617;
      --accent-color: #3b82f6;
      --node-color: #60a5fa;
      --line-color: rgba(96, 165, 250, 0.25);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg-start: #1d4ed8;
        --bg-end: #1e3a8a;
        --accent-color: #60a5fa;
        --node-color: #ffffff;
        --line-color: rgba(255, 255, 255, 0.35);
      }
    }
    .grad-start { stop-color: var(--bg-start); }
    .grad-end { stop-color: var(--bg-end); }
    .accent { fill: var(--accent-color); }
    .node { fill: var(--node-color); }
    .line { stroke: var(--line-color); stroke-width: 14; stroke-linecap: round; stroke-linejoin: round; }
    .pulse {
      animation: pulseAnim 3s infinite ease-in-out;
    }
    @keyframes pulseAnim {
      0%, 100% { opacity: 0.75; }
      50% { opacity: 1; }
    }
  </style>
  
  <!-- Base Squircle (App-like Rounded Corners) -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="url(#bgGrad)" />
  
  <!-- Glowing Border Outline -->
  <rect x="32" y="32" width="448" height="448" rx="128" fill="none" stroke="url(#accentGrad)" stroke-width="12" opacity="0.8" />
  
  <!-- Network Mesh Graph Structure -->
  <g>
    <!-- Main Outer Connection Lines -->
    <line x1="256" y1="130" x2="150" y2="230" class="line" />
    <line x1="256" y1="130" x2="362" y2="230" class="line" />
    <line x1="150" y1="230" x2="190" y2="390" class="line" />
    <line x1="362" y1="230" x2="322" y2="390" class="line" />
    <line x1="190" y1="390" x2="322" y2="390" class="line" />
    
    <!-- Central Hub Star-topology Connections -->
    <line x1="256" y1="130" x2="256" y2="280" class="line" />
    <line x1="150" y1="230" x2="256" y2="280" class="line" />
    <line x1="362" y1="230" x2="256" y2="280" class="line" />
    <line x1="190" y1="390" x2="256" y2="280" class="line" />
    <line x1="322" y1="390" x2="256" y2="280" class="line" />
    
    <!-- Outer Network Nodes -->
    <circle cx="256" cy="130" r="30" class="node" />
    <circle cx="150" cy="230" r="26" class="node" />
    <circle cx="362" cy="230" r="26" class="node" />
    <circle cx="190" cy="390" r="26" class="node" />
    <circle cx="322" cy="390" r="26" class="node" />
    
    <!-- Central Mesh Hub (Highlight with glow filter and subtle pulsing opacity) -->
    <circle cx="256" cy="280" r="44" fill="url(#accentGrad)" filter="url(#glow)" class="pulse" />
    <!-- White core of the central hub -->
    <circle cx="256" cy="280" r="24" fill="#ffffff" />
  </g>
</svg>